<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nihongo Joy | 일본어 학습 대시보드</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>

  <!-- Glassmorphism Header -->
  <header>
    <a href="#" class="logo">
      <span class="logo-icon">🌸</span>
      <span>Nihongo Joy</span>
    </a>
    
    <!-- Dark/Light Theme Switcher -->
    <div class="theme-switch-wrapper">
      <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider">
          <div class="slider-icons">
            <span class="icon-sun">☀️</span>
            <span class="icon-moon">🌙</span>
          </div>
        </div>
      </label>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-gradient-overlay"></div>
    <h1>하루 5분, <span>일본어 공부</span></h1>
    <p>히라가나/가타카나 카드를 뒤집어 발음을 확인하고, 나만의 일본어 단어장을 만들어 학습해보세요.</p>
    
    <!-- 오늘의 표현 Widget -->
    <div class="daily-widget-container">
      <div class="daily-card">
        <div class="daily-content">
          <span class="daily-tag">오늘의 표현</span>
          <h2 class="daily-jp" id="daily-jp">木漏れ日</h2>
          <p class="daily-reading" id="daily-reading">こもれび (코모레비)</p>
          <p class="daily-kr" id="daily-kr">나뭇잎 사이로 비치는 햇빛</p>
        </div>
        <button class="daily-audio-btn" id="daily-audio-btn" title="발음 듣기">🔊</button>
      </div>
    </div>
  </section>

  <!-- Main Dashboard Grid -->
  <main class="container">
    <div class="dashboard-grid">
      
      <!-- Interactive Flashcards -->
      <section class="card">
        <h2 class="card-title">📖 인터랙티브 학습 카드</h2>
        <div class="flashcards-container">
          <div class="mode-selector">
            <button class="mode-btn active" id="btn-hiragana">히라가나</button>
            <button class="mode-btn" id="btn-katakana">가타카나</button>
            <button class="mode-btn" id="btn-phrases">기초 회화</button>
          </div>
          
          <!-- Cards Grid -->
          <div class="cards-grid" id="cards-grid">
            <!-- Cards will be injected dynamically by main.js -->
          </div>
        </div>
      </section>

      <!-- Vocabulary Notebook -->
      <section class="card">
        <h2 class="card-title">✍️ 나만의 일본어 단어장</h2>
        <div class="notebook-wrapper">
          <div class="input-row">
            <input type="text" id="word-jp" placeholder="일본어 (단어/문장)" autocomplete="off" />
            <input type="text" id="word-kr" placeholder="의미 (뜻)" autocomplete="off" />
            <button class="btn-add-word" id="btn-add-word">추가</button>
          </div>
          
          <ul class="word-list" id="word-list">
            <!-- Items will be generated dynamically by main.js -->
          </ul>
        </div>
      </section>

    </div>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
